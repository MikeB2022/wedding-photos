[build]
  functions = "netlify/functions"
  publish = "."

[[redirects]]
  from = "/api/auth"
  to = "/.netlify/functions/auth"
  status = 200

[[redirects]]
  from = "/api/refresh"
  to = "/.netlify/functions/refresh"
  status = 200

[[redirects]]
  from = "/api/upload"
  to = "/.netlify/functions/upload"
  status = 200

[[redirects]]
  from = "/api/albums"
  to = "/.netlify/functions/albums"
  status = 200
