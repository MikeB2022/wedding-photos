<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Share Your Photos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--blush:#f5e6e0;--blush-dark:#e8c4b4;--champagne:#f0e6d0;--gold:#b8935a;--cream:#faf7f2;--ink:#2c2420;--ink-light:#6b5a52;--white:#ffffff;--success:#3d7a4e;--success-bg:#edf7f0;--error:#c0392b;--error-bg:#fdf0ef}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Jost',sans-serif;font-weight:300;background:var(--cream);color:var(--ink);min-height:100vh;display:flex;flex-direction:column}
  header{background:var(--white);border-bottom:1px solid var(--blush-dark);padding:1.25rem 1.5rem;text-align:center}
  .header-eyebrow{font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:.4rem}
  .header-title{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:300;color:var(--ink)}
  .header-title em{font-style:italic;color:var(--gold)}
  .header-date{font-size:.72rem;letter-spacing:.14em;color:var(--ink-light);margin-top:.3rem}
  .table-badge{display:inline-block;background:var(--blush);color:var(--gold);font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;padding:.3rem .9rem;border:1px solid var(--blush-dark);margin-top:.6rem}
  main{flex:1;padding:2rem 1.25rem;max-width:500px;margin:0 auto;width:100%}
  .drop-zone{border:1.5px dashed var(--blush-dark);background:var(--white);padding:2.5rem 1.5rem;text-align:center;cursor:pointer;transition:all .25s;margin-bottom:1.5rem;position:relative}
  .drop-zone:hover,.drop-zone.dragging{border-color:var(--gold);background:var(--blush)}
  .drop-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
  .drop-icon{width:52px;height:52px;border-radius:50%;background:var(--blush);display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem}
  .drop-icon svg{width:24px;height:24px}
  .drop-title{font-family:'Cormorant Garamond',serif;font-size:1.25rem;font-weight:400;color:var(--ink);margin-bottom:.5rem}
  .drop-sub{font-size:.8rem;color:var(--ink-light);line-height:1.6}
  .drop-formats{display:flex;justify-content:center;gap:.4rem;margin-top:.6rem;flex-wrap:wrap}
  .format-tag{font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;padding:.2rem .55rem;background:var(--blush);color:var(--ink-light);border:1px solid var(--blush-dark)}
  .preview-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:1.5rem}
  .preview-item{aspect-ratio:1;position:relative;overflow:hidden;background:var(--blush)}
  .preview-item img{width:100%;height:100%;object-fit:cover;display:block}
  .preview-item .remove-btn{position:absolute;top:4px;right:4px;width:22px;height:22px;background:rgba(44,36,32,0.75);color:white;border:none;border-radius:50%;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;line-height:1;z-index:2}
  .progress-bar-outer{position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--blush-dark)}
  .progress-bar-inner{height:100%;background:var(--gold);transition:width .3s;width:0%}
  .upload-status-overlay{position:absolute;inset:0;background:rgba(255,255,255,.8);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--ink-light)}
  .guest-section{margin-bottom:1.25rem}
  .guest-section label{display:block;font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-light);margin-bottom:.5rem}
  .guest-section input{width:100%;padding:.85rem 1rem;border:1px solid var(--blush-dark);background:var(--white);font-family:'Jost',sans-serif;font-size:.95rem;color:var(--ink);outline:none;transition:border-color .2s;-webkit-appearance:none}
  .guest-section input:focus{border-color:var(--gold)}
  .submit-btn{width:100%;background:var(--ink);color:var(--white);border:none;padding:1rem;font-family:'Jost',sans-serif;font-size:.82rem;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;transition:background .2s;display:flex;align-items:center;justify-content:center;gap:.6rem}
  .submit-btn:hover:not(:disabled){background:var(--gold)}
  .submit-btn:disabled{opacity:.5;cursor:not-allowed}
  .count-badge{background:var(--gold);color:var(--white);font-size:.7rem;padding:.15rem .5rem;border-radius:10px;margin-left:.3rem}
  .success-panel{text-align:center;padding:3rem 1.5rem;background:var(--white);border:1px solid var(--blush-dark);display:none}
  .success-icon{width:60px;height:60px;border-radius:50%;background:var(--success-bg);display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem}
  .success-icon svg{width:28px;height:28px}
  .success-title{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:300;color:var(--ink);margin-bottom:.75rem}
  .success-title em{font-style:italic;color:var(--gold)}
  .success-sub{font-size:.87rem;line-height:1.8;color:var(--ink-light);margin-bottom:2rem}
  .share-more-btn{background:transparent;color:var(--ink);border:1px solid var(--blush-dark);padding:.75rem 1.75rem;font-family:'Jost',sans-serif;font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:all .2s}
  .share-more-btn:hover{background:var(--ink);color:var(--white);border-color:var(--ink)}
  .alert{padding:.8rem 1rem;font-size:.82rem;line-height:1.6;display:flex;gap:.5rem;align-items:flex-start;margin-bottom:1rem}
  .alert-error{background:var(--error-bg);color:var(--error);border:1px solid #f5c6c2}
  .alert svg{flex-shrink:0;margin-top:1px}
  footer{text-align:center;padding:1.5rem;font-size:.72rem;letter-spacing:.08em;color:var(--ink-light);border-top:1px solid var(--blush)}
  @keyframes spin{to{transform:rotate(360deg)}}
  .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite}
</style>
</head>
<body>
<header>
  <p class="header-eyebrow">Wedding Day</p>
  <h1 class="header-title" id="headerTitle">Alexandra <em>&</em> James</h1>
  <p class="header-date" id="headerDate">June 14, 2025 · Rosewood Gardens</p>
  <div class="table-badge" id="tableBadge">Table 1</div>
</header>

<main>
  <div id="uploadForm">
    <div id="errorBanner" style="display:none" class="alert alert-error">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="errorText"></span>
    </div>

    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept="image/*,video/*" multiple>
      <div class="drop-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>
      </div>
      <div class="drop-title">Tap to add photos</div>
      <p class="drop-sub">Share your favourite moments — they'll be saved to our wedding album</p>
      <div class="drop-formats"><span class="format-tag">JPG</span><span class="format-tag">PNG</span><span class="format-tag">HEIC</span><span class="format-tag">MP4</span></div>
    </div>

    <div class="preview-grid" id="previewGrid" style="display:none"></div>

    <div class="guest-section">
      <label>Your name (optional)</label>
      <input type="text" id="guestName" placeholder="e.g. Sarah & Tom">
    </div>

    <button class="submit-btn" id="submitBtn" onclick="submitPhotos()" disabled>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17,8 12,3 7,8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Share Photos
      <span class="count-badge" id="countBadge" style="display:none">0</span>
    </button>
  </div>

  <div class="success-panel" id="successPanel">
    <div class="success-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="1.5"><polyline points="20,6 9,17 4,12"/></svg>
    </div>
    <h2 class="success-title">Thank you <em>so much!</em></h2>
    <p class="success-sub" id="successMsg">Your photos have been added to our wedding album!</p>
    <button class="share-more-btn" onclick="resetForm()">Share more photos</button>
  </div>
</main>

<footer><p id="footerText">Made with love · Alexandra & James</p></footer>

<script>
const params = new URLSearchParams(window.location.search);
const table = params.get('table') || '1';
const albumId = params.get('album') || '';
const name1 = params.get('n1') || 'Alexandra';
const name2 = params.get('n2') || 'James';
const dateStr = params.get('date') || '';
const venue = params.get('venue') || '';

document.getElementById('tableBadge').textContent = 'Table ' + table;
document.getElementById('headerTitle').innerHTML = name1 + ' <em>&</em> ' + name2;
document.getElementById('headerDate').textContent = [dateStr, venue].filter(Boolean).join(' · ');
document.getElementById('footerText').textContent = 'Made with love · ' + name1 + ' & ' + name2;

let selectedFiles = [];

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const previewGrid = document.getElementById('previewGrid');
const submitBtn = document.getElementById('submitBtn');
const countBadge = document.getElementById('countBadge');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragging'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragging'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragging'); handleFiles(Array.from(e.dataTransfer.files)); });
fileInput.addEventListener('change', e => { handleFiles(Array.from(e.target.files)); fileInput.value = ''; });

function handleFiles(files) {
  files.filter(f => f.type.startsWith('image/') || f.type.startsWith('video/')).forEach(file => {
    if (selectedFiles.find(f => f && f.name === file.name && f.size === file.size)) return;
    const idx = selectedFiles.length;
    selectedFiles.push(file);
    addPreview(file, idx);
  });
  updateSubmit();
}

function addPreview(file, idx) {
  previewGrid.style.display = 'grid';
  const item = document.createElement('div');
  item.className = 'preview-item';
  item.id = 'preview-' + idx;
  if (file.type.startsWith('image/')) {
    const reader = new FileReader();
    reader.onload = e => {
      item.innerHTML = `<img src="${e.target.result}" alt=""><button class="remove-btn" onclick="removeFile(${idx})">×</button><div class="progress-bar-outer"><div class="progress-bar-inner" id="prog-${idx}"></div></div>`;
    };
    reader.readAsDataURL(file);
  } else {
    item.innerHTML = `<div style="width:100%;height:100%;background:var(--champagne);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px;font-size:11px;color:var(--ink-light)"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.5"><polygon points="5,3 19,12 5,21"/></svg>Video</div><button class="remove-btn" onclick="removeFile(${idx})">×</button><div class="progress-bar-outer"><div class="progress-bar-inner" id="prog-${idx}"></div></div>`;
  }
  previewGrid.appendChild(item);
}

function removeFile(idx) {
  selectedFiles[idx] = null;
  const item = document.getElementById('preview-' + idx);
  if (item) item.remove();
  if (!selectedFiles.filter(Boolean).length) { previewGrid.style.display = 'none'; selectedFiles = []; }
  updateSubmit();
}

function updateSubmit() {
  const count = selectedFiles.filter(Boolean).length;
  submitBtn.disabled = count === 0;
  countBadge.style.display = count > 0 ? 'inline' : 'none';
  countBadge.textContent = count;
}

function showError(msg) {
  document.getElementById('errorBanner').style.display = 'flex';
  document.getElementById('errorText').textContent = msg;
}
function hideError() { document.getElementById('errorBanner').style.display = 'none'; }

function toBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function setProgress(idx, pct) {
  const bar = document.getElementById('prog-' + idx);
  if (bar) bar.style.width = pct + '%';
}

async function submitPhotos() {
  const files = selectedFiles.filter(Boolean);
  if (!files.length) return;
  hideError();
  submitBtn.disabled = true;
  submitBtn.innerHTML = '<span class="spinner"></span> Uploading…';

  const guestName = document.getElementById('guestName').value || '';
  let uploaded = 0, failed = 0;

  for (let i = 0; i < selectedFiles.length; i++) {
    const file = selectedFiles[i];
    if (!file) continue;
    setProgress(i, 30);
    try {
      const data = await toBase64(file);
      setProgress(i, 60);
      const res = await fetch('/api/upload', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          folder_name: albumId || 'Wedding Photos',
          filename: file.name,
          mimetype: file.type,
          data,
          guest_name: guestName || undefined,
          table
        })
      });
      const result = await res.json();
      setProgress(i, 100);
      if (result.success) { uploaded++; }
      else { failed++; console.error('Upload error:', result.error); }
    } catch (err) {
      failed++;
      setProgress(i, 0);
      console.error('Upload failed:', err);
    }
  }

  if (uploaded === 0 && failed > 0) {
    showError('Upload failed. Please try again or ask the couple for help.');
    submitBtn.disabled = false;
    submitBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17,8 12,3 7,8"/><line x1="12" y1="3" x2="12" y2="15"/></svg> Share Photos';
    return;
  }

  document.getElementById('uploadForm').style.display = 'none';
  document.getElementById('successPanel').style.display = 'block';
  const msg = failed > 0
    ? `${uploaded} photo${uploaded > 1 ? 's' : ''} shared! (${failed} failed to upload)`
    : `Your ${uploaded} photo${uploaded > 1 ? 's' : ''} ${uploaded > 1 ? 'have' : 'has'} been added to the wedding album. Thank you!`;
  document.getElementById('successMsg').textContent = msg;
}

function resetForm() {
  selectedFiles = [];
  previewGrid.innerHTML = '';
  previewGrid.style.display = 'none';
  document.getElementById('guestName').value = '';
  document.getElementById('successPanel').style.display = 'none';
  document.getElementById('uploadForm').style.display = 'block';
  hideError();
  submitBtn.disabled = true;
  submitBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17,8 12,3 7,8"/><line x1="12" y1="3" x2="12" y2="15"/></svg> Share Photos <span class="count-badge" id="countBadge" style="display:none">0</span>';
}
</script>
</body>
</html>
